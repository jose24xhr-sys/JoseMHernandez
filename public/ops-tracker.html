<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ops Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fafaf8; --bg2:#f3f2ef; --bg3:#eae9e4;
  --border:#e0ddd6; --border2:#ccc9c0;
  --text:#1a1a18; --text2:#6b6b64; --text3:#a8a89e;
  --green:#1d9e75; --green-bg:#e6f5ef; --green-text:#085041; --green-border:#9fd4be;
  --blue:#185fa5; --blue-bg:#e8f1fb; --blue-text:#0c447c; --blue-border:#b5d4f4;
  --orange:#d85a30; --orange-bg:#faeeda; --orange-text:#633806; --orange-border:#fac775;
  --purple:#534ab7; --purple-bg:#eeeaf9; --purple-text:#2d2580; --purple-border:#c5bef0;
  --yellow:#b8860b; --yellow-bg:#fffbea; --yellow-border:#e8d87a;
  --red-bg:#fef0f0; --red-text:#7a1c1c; --red-border:#f0a0a0;
  --gold:#c9820a; --gold-bg:#fff8e1; --gold-border:#f5c842;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',ui-monospace,monospace;
  --r:8px; --rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--text);min-height:100vh}
.shell{max-width:980px;margin:24px auto 40px;border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;background:var(--bg);box-shadow:0 2px 20px rgba(0,0,0,.07)}

/* DATE BAR */
.date-bar{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
.date-nav{display:flex;align-items:center;gap:10px}
.date-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border2);background:none;cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:background .15s}
.date-btn:hover{background:var(--bg3)}
.date-label{font-size:15px;font-weight:500;min-width:210px;text-align:center}
.today-btn{font-size:12px;padding:4px 12px;border:1px solid var(--border2);border-radius:99px;background:none;cursor:pointer;color:var(--text2);font-family:var(--sans);transition:background .15s}
.today-btn:hover{background:var(--bg3)}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2)}
.tab{flex:1;padding:10px;font-size:13px;font-weight:500;text-align:center;cursor:pointer;color:var(--text2);border:none;border-bottom:2px solid transparent;background:none;font-family:var(--sans);transition:all .15s}
.tab:hover{color:var(--text)}
.tab.on{color:var(--text);border-bottom:2px solid var(--text);background:var(--bg)}
.panel{display:none}.panel.on{display:block}

/* BANNER */
.planned-banner{padding:10px 20px 6px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.banner-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--yellow);margin-bottom:2px}
.banner-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:var(--r)}
.banner-item.done .banner-name{text-decoration:line-through;color:var(--text3)}
.banner-chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--yellow);background:none;cursor:pointer;flex-shrink:0;position:relative;transition:all .15s}
.banner-chk.on{background:var(--yellow)}
.banner-chk.on::after{content:'';display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(42deg) translate(4px,1px)}
.banner-name{font-size:13px;font-weight:500;color:var(--yellow)}
.banner-empty{font-size:12px;color:var(--text3);font-style:italic;padding:2px 0 4px}
.cat-pill{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr}
.col{padding:16px 20px;overflow-y:auto;max-height:520px}
.col-l{border-right:1px solid var(--border)}
.col-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.col-title{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);font-weight:500}
.prog-bar{height:3px;background:var(--bg3);border-radius:99px;margin-bottom:14px}
.prog-fill{height:3px;border-radius:99px;background:var(--green);transition:width .3s}

/* SECTIONS */
.sec-wrap{margin-top:10px}.sec-wrap:first-child{margin-top:0}
.sec-sep{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);margin-bottom:3px;cursor:pointer;user-select:none;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);transition:color .15s}
.sec-sep:hover{color:var(--text)}
.sec-chev{font-size:11px;transition:transform .2s;flex-shrink:0;width:14px;display:inline-block}
.sec-chev.closed{transform:rotate(-90deg)}
.sec-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.sec-count{font-size:10px;color:var(--text3);font-family:var(--mono)}
.sec-add-btn{font-size:10px;padding:1px 7px;border:1px solid var(--border);border-radius:4px;background:none;cursor:pointer;color:var(--text2);font-family:var(--sans);transition:background .15s}
.sec-add-btn:hover{background:var(--bg3)}
.sec-blocks.collapsed{display:none}

/* BLOCKS */
.block-wrap{border-bottom:1px solid var(--bg3)}.block-wrap:last-child{border-bottom:none}
.block-head{display:flex;align-items:center;gap:7px;padding:7px 0 4px;cursor:pointer}
.chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;background:none;transition:all .15s;position:relative}
.chk:hover{border-color:var(--green)}
.chk.on{background:var(--green);border-color:var(--green)}
.chk.on::after{content:'';display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(42deg) translate(4px,1px)}
.block-title{font-size:13px;font-weight:500;color:var(--text);flex:1;line-height:1.3}
.block-wrap.done .block-title{text-decoration:line-through;color:var(--text3)}
.sub-count{font-size:11px;color:var(--text3);font-family:var(--mono);flex-shrink:0}
.blk-edit-btn,.blk-del-btn{width:24px;height:24px;border:none;background:none;cursor:pointer;border-radius:4px;flex-shrink:0;opacity:0;transition:opacity .15s,background .15s;font-size:13px;color:var(--text2)}
.block-wrap:hover .blk-edit-btn,.block-wrap:hover .blk-del-btn{opacity:.6}
.blk-edit-btn:hover{opacity:1!important;background:var(--bg3)}
.blk-del-btn:hover{opacity:1!important;background:var(--red-bg);color:var(--red-text)}
.block-result{font-size:11px;color:var(--text2);margin-left:25px;margin-bottom:3px;font-style:italic}
.tags{display:flex;gap:4px;margin-left:25px;margin-bottom:6px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:99px;border:1px solid;font-weight:500}
.tag-h{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-border)}
.tag-w{background:var(--orange-bg);color:var(--orange-text);border-color:var(--orange-border)}
.tag-p{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border)}
.tag-fire{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border)}

/* SUBTASKS */
.subtasks{margin-left:25px;margin-bottom:8px;display:none}.subtasks.open{display:block}
.subtask{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--bg3)}.subtask:last-child{border-bottom:none}
.sub-chk{width:14px;height:14px;border-radius:3px;border:1px solid var(--border2);flex-shrink:0;cursor:pointer;background:none;position:relative;transition:all .1s}
.sub-chk:hover{border-color:var(--green)}
.sub-chk.on{background:var(--green);border-color:var(--green)}
.sub-chk.on::after{content:'';display:block;width:3px;height:7px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(42deg) translate(3px,0px)}
.sub-txt{font-size:12px;color:var(--text);flex:1}
.subtask.done .sub-txt{text-decoration:line-through;color:var(--text3)}
.sub-badge{font-size:9px;padding:1px 5px;border-radius:3px;border:1px solid var(--border);background:var(--bg2);color:var(--text3);white-space:nowrap}
.sub-badge.hab{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border)}
.sub-badge.today-only{background:var(--orange-bg);color:var(--orange-text);border-color:var(--orange-border)}
.sub-actions{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s}
.subtask:hover .sub-actions{opacity:1}
.sub-btn{width:20px;height:20px;border:none;background:none;cursor:pointer;border-radius:3px;font-size:11px;color:var(--text2);transition:background .1s}
.sub-btn:hover{background:var(--bg3)}
.sub-btn.del:hover{background:var(--red-bg);color:var(--red-text)}
.add-sub-row{display:flex;gap:6px;margin-top:6px}
.add-sub-row input{flex:1;font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-family:var(--sans)}
.add-sub-row input:focus{outline:none;border-color:var(--green)}
.add-sub-row button{font-size:12px;padding:4px 10px;border:1px solid var(--border);border-radius:5px;background:none;cursor:pointer;color:var(--text2);font-family:var(--sans)}
.add-sub-row button:hover{background:var(--bg3)}

/* HABITS TODAY */
.hab-grp-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:3px;display:flex;align-items:center;justify-content:space-between}
.hab-grp-add{font-size:10px;padding:1px 6px;border:1px solid var(--border);border-radius:4px;background:none;cursor:pointer;color:var(--text2);font-family:var(--sans)}
.hab-grp-add:hover{background:var(--bg3)}
.hab-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bg3)}
.hab-row:last-child{border-bottom:none}
.hab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hab-name{font-size:12px;color:var(--text);flex:1}
.hab-row-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s}
.hab-row:hover .hab-row-actions{opacity:1}
.hab-row-btn{width:18px;height:18px;border:none;background:none;cursor:pointer;border-radius:3px;font-size:11px;color:var(--text2)}
.hab-row-btn:hover{background:var(--bg3)}
.hab-row-btn.del:hover{background:var(--red-bg);color:var(--red-text)}
.hab-chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;background:none;position:relative;transition:all .15s}
.hab-chk:hover:not(.readonly){border-color:var(--green)}
.hab-chk.on{background:var(--green);border-color:var(--green)}
.hab-chk.on::after{content:'';display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(42deg) translate(4px,1px)}
.hab-chk.readonly{cursor:default;opacity:.45}
.auto-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--green-bg);color:var(--green-text);border:1px solid var(--green-border)}

/* MONTHLY */
.monthly-wrap{padding:16px 20px;overflow-x:auto}
.month-sec{margin-bottom:28px}
.month-sec-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.tracker-table{border-collapse:collapse;width:100%}
.tracker-table th{font-size:9px;color:var(--text3);font-family:var(--mono);text-align:center;padding:2px 1px;font-weight:400;min-width:19px}
.tracker-table th.today-th{color:var(--green);font-weight:500}
.tracker-table th.wknd-th{color:var(--purple)}
.hab-lbl-td{font-size:11px;font-weight:500;color:var(--text);padding-right:8px;white-space:nowrap;width:120px}
.day-box{width:16px;height:16px;border-radius:3px;border:1px solid var(--border);background:var(--bg2);display:inline-block;vertical-align:middle;transition:background .1s}
.day-box.hit{background:var(--green);border-color:var(--green)}
.day-box.wknd{border-color:#d8d4eb}
.day-box.wknd.hit{background:var(--purple);border-color:var(--purple)}
.day-box.cur{border:2px solid var(--green);background:#fff;cursor:pointer}
.day-box.cur.hit{background:var(--green)}
.dow-td{font-size:9px;color:var(--text3);text-align:center;padding-bottom:3px}
.dow-td.wknd-td{color:var(--purple)}
.score-td{font-size:9px;font-family:var(--mono);text-align:center;padding-top:3px;color:var(--text3)}

/* REWARDS */
.rewards-wrap{padding:16px 20px;border-top:1px solid var(--border)}
.rewards-title{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:12px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.reward-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.reward-card{border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;background:var(--bg2);position:relative;transition:border-color .2s}
.reward-card.unlocked{border-color:var(--gold-border);background:var(--gold-bg)}
.reward-card.unlocked .reward-name{color:var(--gold)}
.reward-icon{font-size:20px;margin-bottom:4px}
.reward-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.reward-cond{font-size:11px;color:var(--text2);margin-bottom:6px}
.reward-prog-bar{height:4px;background:var(--bg3);border-radius:99px;overflow:hidden}
.reward-prog-fill{height:4px;border-radius:99px;background:var(--green);transition:width .4s}
.reward-card.unlocked .reward-prog-fill{background:var(--gold)}
.reward-pct{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
.reward-del{position:absolute;top:8px;right:8px;width:18px;height:18px;border:none;background:none;cursor:pointer;border-radius:3px;font-size:11px;color:var(--text3);opacity:0;transition:opacity .15s}
.reward-card:hover .reward-del{opacity:1}
.reward-del:hover{background:var(--red-bg);color:var(--red-text)}
.add-reward-btn{font-size:12px;padding:5px 12px;border:1px dashed var(--border2);border-radius:var(--r);background:none;cursor:pointer;color:var(--text2);font-family:var(--sans);transition:background .15s}
.add-reward-btn:hover{background:var(--bg3)}

/* PLANNED */
.planned-wrap{padding:16px 20px;overflow-x:auto}
.planned-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.planned-legend{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
.pl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.pl-swatch{width:12px;height:12px;border-radius:3px;border:1px solid}
.planned-table{border-collapse:collapse;width:100%}
.planned-table th{font-size:9px;color:var(--text3);font-family:var(--mono);text-align:center;padding:2px 1px;min-width:19px;font-weight:400}
.planned-table th.today-th{color:var(--green);font-weight:500}
.planned-table th.wknd-th{color:var(--purple)}
.act-lbl-td{font-size:12px;font-weight:500;color:var(--text);padding-right:8px;white-space:nowrap;min-width:160px;cursor:grab;user-select:none}
.grip{font-size:13px;opacity:.35;margin-right:4px;vertical-align:middle}
.act-cat{font-size:9px;padding:1px 5px;border-radius:3px;margin-right:4px;font-weight:500}
.plan-box{width:16px;height:16px;border-radius:3px;border:1px solid var(--border);background:var(--bg2);display:inline-block;vertical-align:middle;cursor:pointer;transition:background .1s}
.plan-box.sched{background:var(--yellow-bg);border-color:var(--yellow-border)}
.plan-box.done-a{background:var(--yellow);border-color:var(--yellow)}
.plan-box.today-c{outline:2px solid var(--green);outline-offset:1px}
.plan-box.wknd-b{border-color:#d8d4eb}
.plan-box.wknd-b.sched{background:#e8e0ff;border-color:#b8a8f0}
.plan-box.wknd-b.done-a{background:var(--purple);border-color:var(--purple)}
.act-tr.dragging{opacity:.35}
.act-tr.drag-over td{border-top:2px solid var(--green)}

/* LOG */
.log-panel{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.log-sum{background:var(--bg2);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--text2);line-height:1.7;border:1px solid var(--border)}
.lf label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.lf textarea{width:100%;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);color:var(--text);font-size:13px;padding:10px 12px;font-family:var(--sans);resize:none;transition:border-color .15s}
.lf textarea:focus{outline:none;border-color:var(--green)}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal-box{background:var(--bg);border:1px solid var(--border2);border-radius:var(--rl);padding:20px;width:300px;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal-box h3{font-size:15px;font-weight:500;margin-bottom:14px}
.mf{margin-bottom:10px}
.mf label{font-size:10px;color:var(--text2);display:block;margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.mf input,.mf select{width:100%;font-size:13px;padding:6px 9px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-family:var(--sans);transition:border-color .15s}
.mf input:focus,.mf select:focus{outline:none;border-color:var(--green)}
.m-actions{display:flex;gap:8px;margin-top:16px}
.m-actions button{flex:1;font-size:13px;padding:8px;border-radius:6px;border:1px solid var(--border);cursor:pointer;background:none;font-family:var(--sans);color:var(--text);font-weight:500;transition:background .15s}
.m-actions button:hover{background:var(--bg2)}
.m-save{background:var(--green-bg)!important;color:var(--green-text)!important;border-color:var(--green-border)!important}
.m-save-y{background:var(--yellow-bg)!important;color:var(--yellow)!important;border-color:var(--yellow-border)!important}
.m-save-gold{background:var(--gold-bg)!important;color:var(--gold)!important;border-color:var(--gold-border)!important}

/* BLOCK DROP TARGET */
.block-wrap.drop-target{background:var(--green-bg);border-left:2px solid var(--green)}
.block-wrap.drop-target .block-title{color:var(--green-text)}

/* HABITS COLLAPSIBLE HEADER */
.hab-col-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.hab-col-hdr:hover{background:var(--bg3)}
.hab-col-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text2)}
.hab-col-chev{font-size:13px;color:var(--text3);transition:transform .2s}
.hab-col-chev.closed{transform:rotate(-90deg)}
.hab-col-body{border-bottom:1px solid var(--border)}
.hab-col-body.collapsed{display:none}

/* TODO SECTION */
.todo-wrap{padding:16px 20px}
.todo-section-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.todo-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.todo-col-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.todo-badge{font-size:9px;padding:1px 6px;border-radius:99px;font-weight:500}
.todo-badge-today{background:var(--blue-bg);color:var(--blue-text);border:1px solid var(--blue-border)}
.todo-badge-general{background:var(--purple-bg);color:var(--purple-text);border:1px solid var(--purple-border)}
.todo-item{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid var(--bg3)}
.todo-item:last-child{border-bottom:none}
.todo-chk{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;cursor:pointer;background:none;position:relative;transition:all .15s}
.todo-chk:hover{border-color:var(--green)}
.todo-chk.on{background:var(--green);border-color:var(--green)}
.todo-chk.on::after{content:'';display:block;width:3px;height:7px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(42deg) translate(3px,0px)}
.todo-text{font-size:12px;color:var(--text);flex:1;line-height:1.4}
.todo-item.done-todo .todo-text{text-decoration:line-through;color:var(--text3)}
.todo-item-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0}
.todo-item:hover .todo-item-actions{opacity:1}
.todo-act-btn{width:20px;height:20px;border:none;background:none;cursor:pointer;border-radius:3px;font-size:11px;color:var(--text2);transition:background .1s}
.todo-act-btn:hover{background:var(--bg3)}
.todo-act-btn.dispatch{color:var(--blue-text)}
.todo-act-btn.dispatch:hover{background:var(--blue-bg)}
.todo-act-btn.del:hover{background:var(--red-bg);color:var(--red-text)}
.todo-add-row{display:flex;gap:6px;margin-top:8px}
.todo-add-row input{flex:1;font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-family:var(--sans)}
.todo-add-row input:focus{outline:none;border-color:var(--green)}
.todo-add-row button{font-size:12px;padding:4px 10px;border:1px solid var(--border);border-radius:5px;background:none;cursor:pointer;color:var(--text2);font-family:var(--sans)}
.todo-add-row button:hover{background:var(--bg3)}
.todo-empty{font-size:12px;color:var(--text3);font-style:italic;padding:4px 0}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
</style>
</head>
<body>
<div class="shell">

  <div class="date-bar">
    <div class="date-nav">
      <button class="date-btn" onclick="changeDay(-1)">&#8249;</button>
      <div class="date-label" id="date-label"></div>
      <button class="date-btn" onclick="changeDay(1)">&#8250;</button>
    </div>
    <button class="today-btn" onclick="goToday()">Today</button>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="showTab('agenda',this)">Agenda</button>
    <button class="tab" onclick="showTab('habits',this)">Habits</button>
    <button class="tab" onclick="showTab('planned',this)">Planned</button>
    <button class="tab" onclick="showTab('log',this)">Log</button>
  </div>

  <div id="tab-agenda" class="panel on">
    <div id="planned-banner" class="planned-banner"></div>
    <div class="two-col">
      <div class="col col-l" id="block-col">
        <div class="col-hdr">
          <span class="col-title">Blocks</span>
          <span id="prog-label" style="font-size:11px;color:var(--text3);font-family:var(--mono)">0/10</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      </div>
      <!-- RIGHT COLUMN: habits (collapsible) + todo list -->
      <div class="col" style="padding:0;display:flex;flex-direction:column;overflow:hidden;max-height:520px">

        <!-- HABITS COLLAPSIBLE -->
        <div id="right-hab-hdr" onclick="toggleRightHab()" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;flex-shrink:0;background:var(--bg2);">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="col-title">Habits</span>
            <span id="hab-count" style="font-size:11px;color:var(--text3);font-family:var(--mono)">0/15</span>
          </div>
          <span id="right-hab-chev" style="font-size:12px;color:var(--text3);transition:transform .2s">&#8964;</span>
        </div>
        <div id="right-hab-body" style="overflow-y:auto;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0">
          <div id="hab-today"></div>
        </div>

        <!-- TODO LIST -->
        <div style="flex:1;overflow-y:auto;padding:10px 16px;min-height:0">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)">
            <span class="col-title">To-do list</span>
            <span id="todo-day-label" style="font-size:11px;color:var(--text3)"></span>
          </div>

          <!-- TODAY todos -->
          <div style="margin-bottom:12px">
            <div class="todo-col-title" style="margin-bottom:6px">Today <span class="todo-badge todo-badge-today">this day only</span></div>
            <div id="todo-today-list"
              ondragover="event.preventDefault()"
              ondrop="dropTodoOnList(event,'today')"></div>
            <div class="todo-add-row">
              <input id="todo-today-input" type="text" placeholder="Add a to-do for today..." onkeydown="if(event.key==='Enter')addTodo('today')">
              <button onclick="addTodo('today')">+</button>
            </div>
          </div>

          <!-- GENERAL todos -->
          <div>
            <div class="todo-col-title" style="margin-bottom:6px">General <span class="todo-badge todo-badge-general">persists until done</span></div>
            <div id="todo-general-list"
              ondragover="event.preventDefault()"
              ondrop="dropTodoOnList(event,'general')"></div>
            <div class="todo-add-row">
              <input id="todo-general-input" type="text" placeholder="Add a general to-do..." onkeydown="if(event.key==='Enter')addTodo('general')">
              <button onclick="addTodo('general')">+</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="tab-habits" class="panel">
    <div class="hab-col-hdr" onclick="toggleHabSection()" id="hab-col-hdr">
      <span class="hab-col-title">Monthly habit tracker</span>
      <span class="hab-col-chev" id="hab-col-chev">&#8964;</span>
    </div>
    <div class="hab-col-body" id="hab-col-body">
      <div class="monthly-wrap" id="monthly-wrap"></div>
      <div class="rewards-wrap" id="rewards-wrap"></div>
    </div>
  </div>

  <div id="tab-planned" class="panel">
    <div class="planned-wrap">
      <div class="planned-hdr">
        <div>
          <div style="font-size:14px;font-weight:500">Planned — June 2026</div>
          <div class="planned-legend">
            <div class="pl-item"><div class="pl-swatch" style="background:var(--bg2);border-color:var(--border)"></div>empty</div>
            <div class="pl-item"><div class="pl-swatch" style="background:var(--yellow-bg);border-color:var(--yellow-border)"></div>scheduled</div>
            <div class="pl-item"><div class="pl-swatch" style="background:var(--yellow);border-color:var(--yellow)"></div>done</div>
            <div class="pl-item" style="opacity:.6">&#8801; drag to reorder</div>
          </div>
        </div>
        <button onclick="openActModal()" style="font-size:12px;padding:6px 14px;border:1px solid var(--border);border-radius:var(--r);background:none;cursor:pointer;color:var(--text2);font-family:var(--sans)">+ Add activity</button>
      </div>
      <div id="planned-table-wrap" style="overflow-x:auto"></div>
    </div>
  </div>

  <div id="tab-log" class="panel">
    <div class="log-panel">
      <div class="log-sum" id="log-sum">&#8212;</div>
      <div class="lf"><label>Daily reflection</label><textarea rows="4" placeholder="What happened today? What shifted?"></textarea></div>
      <div class="lf"><label>Financial note</label><textarea rows="2" placeholder="Debt balance / movement..."></textarea></div>
      <div class="lf"><label>Tomorrow's top 3</label><textarea rows="3" placeholder="1. &#10;2. &#10;3. "></textarea></div>
    </div>
  </div>
</div>

<!-- BLOCK MODAL -->
<div class="overlay" id="modal">
  <div class="modal-box">
    <h3 id="modal-title">Add block</h3>
    <div class="mf"><label>Name</label><input id="m-name" type="text" placeholder="e.g. ARENA step"></div>
    <div class="mf"><label>Expected result</label><input id="m-result" type="text" placeholder="e.g. One action taken"></div>
    <div class="mf"><label>Section</label>
      <select id="m-section"><option>Morning</option><option>Work</option><option>Afternoon</option><option>Night</option></select>
    </div>
    <div class="mf"><label>Category</label>
      <select id="m-cat"><option value="h">health</option><option value="w">work</option><option value="p">project</option></select>
    </div>
    <div class="m-actions">
      <button onclick="closeOverlay('modal')">Cancel</button>
      <button class="m-save" onclick="saveBlock()">Save block</button>

  </div>
</div>

<!-- HABIT MODAL -->
<div class="overlay" id="hab-modal">

    <h3 id="hab-modal-title">Add habit</h3>
    <div class="mf"><label>Name</label><input id="hm-name" type="text" placeholder="e.g. Cold shower"></div>

      <select id="hm-color">

        <option value="#534AB7">Purple</option><option value="#D85A30">Orange</option>

        <option value="#B8860B">Gold</option>
      </select>
    </div>

      <select id="hm-group">
        <option>Body</option><option>Mind</option><option>Growth</option><option>Money</option>
      </select>
    </div>
    <div class="m-actions">
      <button onclick="closeOverlay('hab-modal')">Cancel</button>
      <button class="m-save" onclick="saveHabit()">Save habit</button>

  </div>
</div>

<!-- SUBTASK EDIT MODAL -->
<div class="overlay" id="sub-modal">
  <div class="modal-box">
    <h3>Edit subtask</h3>
    <div class="mf"><label>Subtask text</label><input id="sub-edit-val" type="text"></div>
    <div class="m-actions">
      <button onclick="closeOverlay('sub-modal')">Cancel</button>
      <button class="m-save" onclick="saveSubEdit()">Save</button>

  </div>
</div>

<!-- ACTIVITY MODAL -->
<div class="overlay" id="act-modal">
  <div class="modal-box">
    <h3>Add planned activity</h3>
    <div class="mf"><label>Activity name</label><input id="a-name" type="text" placeholder="e.g. Corte de Barba"></div>
    <div class="mf"><label>Category</label>
      <select id="a-cat">
        <option value="H">H &#8212; Higiene</option><option value="Y">Y &#8212; Personal</option>
        <option value="G">G &#8212; Grooming</option><option value="E">E &#8212; Home</option>
        <option value="N">N &#8212; Needs</option><option value="S">S &#8212; Social</option>
        <option value="P">P &#8212; Planificaci&#243;n</option>

</div>

<!-- REWARD MODAL -->
<div class="overlay" id="reward-modal">
  <div class="modal-box">
    <h3>Add reward</h3>
    <div class="mf"><label>Reward name</label><input id="rw-name" type="text" placeholder="e.g. Movie night"></div>
    <div class="mf"><label>Icon (emoji)</label><input id="rw-icon" type="text" placeholder="e.g. &#127881;" maxlength="2"></div>

      <select id="rw-type" onchange="updateRewardFields()">
        <option value="daily">Daily % threshold</option>
        <option value="streak">Streak (days in a row)</option>
      </select>
    </div>

    <div class="mf" id="rw-streak-field" style="display:none"><label>Streak days required</label><input id="rw-streak" type="number" min="1" value="7"></div>

  </div>
</div>


<!-- DISPATCH TODO MODAL -->

  <div class="modal-box">
    <h3>Send to agenda block</h3>
    <div class="mf"><label>Target section</label>
      <select id="dp-section"><option>Morning</option><option>Work</option><option>Afternoon</option><option>Night</option></select>
    </div>
    <div class="mf"><label>Target block</label>
      <select id="dp-block"></select>
    </div>
    <div class="mf"><label>Date (June 1&#8211;30)</label>
      <input id="dp-day" type="number" min="1" max="30" value="3">
    </div>
    <div class="m-actions">
      <button onclick="closeOverlay('dispatch-modal')">Cancel</button>
      <button class="m-save" onclick="confirmDispatch()">Send to block</button>
    </div>
  </div>
</div>

<script>
const TODAY = 3, DAYS = 30;
let currentDay = TODAY;
const DOW = ['L','M','W','J','V','S','D'];
const DOW_FULL = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const getDow = d => (d - 1) % 7;
const isWknd = d => getDow(d) >= 5;
const fmt = d => `${DOW_FULL[getDow(d)]}, June ${d} \u2014 2026`;

const SEC_STATE = { Morning:false, Work:false, Afternoon:false, Night:false };
let editingBlockId = null, editingSubInfo = null, editingHabId = null;

// ── BLOCK TEMPLATE (structure only, no state) ──
const BLOCK_TEMPLATES = [
  { id:'b1', sec:'Morning', title:'Morning routine', result:'Body ready, mind clear', cat:'h', habOnComplete:[],
    defaultSubs:[{t:'Drink water',hab:'h_water'},{t:'Wash face & teeth',hab:'h_hygiene'},{t:'Stretch',hab:'h_stretch'},{t:'Meditate',hab:'h_meditate'},{t:'Exercise 40min',hab:'h_exercise'},{t:'Shower',hab:'h_hygiene'},{t:'Healthy breakfast',hab:'h_eat'}]},
  { id:'b2', sec:'Morning', title:'Intention setter', result:'Next step defined', cat:'p', habOnComplete:[],
    defaultSubs:[{t:'Review notes',hab:null},{t:'Set WIVO next step',hab:null},{t:'Set ARENA next step',hab:null}]},
  { id:'b3', sec:'Work', title:'WIVO \u2014 next step', result:'Decision logged', cat:'p', habOnComplete:['h_projects'],
    defaultSubs:[{t:'Check where I left off',hab:null},{t:'Define next step',hab:null}]},
  { id:'b4', sec:'Work', title:'ARENA \u2014 roadmap step', result:'One concrete action', cat:'p', habOnComplete:['h_projects'],
    defaultSubs:[{t:'Check roadmap',hab:null},{t:'Execute one step',hab:null}]},
  { id:'b5', sec:'Work', title:'Routemize work block', result:'CS, onboarding, QA done', cat:'w', habOnComplete:[],
    defaultSubs:[{t:'Check support queue',hab:null},{t:'QA chatbot',hab:null}]},
  { id:'b6', sec:'Afternoon', title:'Chinese lesson', result:'Audio + 10 symbols done', cat:'h', habOnComplete:[],
    defaultSubs:[{t:'Pimsleur audio',hab:'h_chinese_audio'},{t:'Write 10 symbols',hab:'h_chinese_card'},{t:'Check upcoming lesson',hab:'h_chinese'}]},
  { id:'b7', sec:'Night', title:'Dinner + series', result:'Recovery time', cat:'h', habOnComplete:[],
    defaultSubs:[{t:'Eat well',hab:'h_eat'}]},
  { id:'b8', sec:'Night', title:'Water \u2192 stretch \u2192 meditate', result:'Body wound down', cat:'h', habOnComplete:[],
    defaultSubs:[{t:'Drink water',hab:'h_water'},{t:'Stretch',hab:'h_stretch'},{t:'Meditate',hab:'h_meditate'}]},
  { id:'b9', sec:'Night', title:'Reflection + financial record', result:'Written, balance updated', cat:'h', habOnComplete:[],
    defaultSubs:[{t:'Write reflection',hab:'h_improve'},{t:'Log debt balance',hab:'h_financial'},{t:'Goal review',hab:'h_goals'}]},
  { id:'b10', sec:'Night', title:'Next day plan', result:'Top 3 defined', cat:'h', habOnComplete:[],
    defaultSubs:[{t:'Write top 3',hab:null}]},
];

// Per-day state: { [dayKey]: { blocks: { [id]: {done, open, subs:[{t,done,def,hab}]} }, habits: {[id]:bool} } }
const DAY_STORE = {};

function dayKey(d) { return 'june-' + d; }

function getDayState(d) {
  const k = dayKey(d);
  if (!DAY_STORE[k]) {
    // initialise from templates
    const blocks = {};
    BLOCK_TEMPLATES.forEach(t => {
      blocks[t.id] = {
        done: false, open: false,
        subs: t.defaultSubs.map(s => ({ t: s.t, done: false, def: true, hab: s.hab }))
      };
    });
    DAY_STORE[k] = { blocks, habits: {} };
  }
  return DAY_STORE[k];
}

// Also store template edits separately so they persist across days
// (title, result, cat, habOnComplete are on the template itself)

let HABITS = [
  {id:'h_sleep',   name:'Dormir 7h',       color:'#534AB7', group:'Body',   done:false},
  {id:'h_exercise',name:'Ejercicio',        color:'#1D9E75', group:'Body',   done:false},
  {id:'h_stretch', name:'Estirarme',        color:'#639922', group:'Body',   done:false},
  {id:'h_water',   name:'2L agua',          color:'#185FA5', group:'Body',   done:false},
  {id:'h_eat',     name:'Comer bien',       color:'#639922', group:'Body',   done:false},
  {id:'h_hygiene', name:'Higiene',          color:'#185FA5', group:'Body',   done:false},
  {id:'h_meditate',name:'Meditar',          color:'#1D9E75', group:'Mind',   done:false},
  {id:'h_social',  name:'Sin redes',        color:'#A32D2D', group:'Mind',   done:false},
  {id:'h_improve', name:'Mejorar 1 cosa',   color:'#993C1D', group:'Mind',   done:false},
  {id:'h_chinese', name:'Estudiar chino',   color:'#D85A30', group:'Growth', done:false},
  {id:'h_chinese_audio', name:'Chinese audio', color:'#D85A30', group:'Growth', done:false},
  {id:'h_chinese_card',  name:'Chinese cards', color:'#D85A30', group:'Growth', done:false},
  {id:'h_goals',   name:'Goal review',      color:'#534AB7', group:'Growth', done:false},
  {id:'h_projects',name:'Proyectos',        color:'#185FA5', group:'Growth', done:false},
  {id:'h_financial',name:'Registro fin.',   color:'#639922', group:'Money',  done:false},
];

// Mock historical data
const HDATA = {};
HABITS.forEach(h => {
  HDATA[h.id] = Array.from({length:30}, (_,i) => i < TODAY-1 ? Math.random() > .2 : null);
});

let ACTIVITIES = [
  {id:'a1',name:'Recorte de Barba',cat:'H',days:{4:1,11:2,18:1,25:1}},
  {id:'a2',name:'Corte de U\u00f1as',cat:'Y',days:{3:2,17:1,28:1}},
  {id:'a3',name:'Corte de Pelo',cat:'G',days:{20:1}},
  {id:'a4',name:'Lavado de Ba\u00f1o',cat:'I',days:{5:2,16:1,22:1}},
  {id:'a5',name:'Limpieza de Cuarto',cat:'E',days:{7:2,14:1,21:1,30:1}},
  {id:'a6',name:'Lavado de Ropa',cat:'N',days:{4:2,9:1,14:2,19:1,24:1,29:1}},
  {id:'a7',name:'Planificacion',cat:'P',days:{5:2,13:1,20:1,27:1}},
  {id:'a8',name:'Fast',cat:'Y',days:{8:1,17:1,26:1}},
  {id:'a9',name:'Hang Out With Friends',cat:'S',days:{13:1,20:1,28:1}},
  {id:'a10',name:'House Improvement',cat:'E',days:{15:1,22:1,29:1}},
  {id:'a11',name:'Recarga Celular',cat:'N',days:{10:1,20:1}},
];

let REWARDS = [
  {id:'r1', name:'Movie night', icon:'🎬', type:'daily', threshold:80},
  {id:'r2', name:'Buy something', icon:'🛍️', type:'streak', threshold:7},
  {id:'r3', name:'Rest day', icon:'😴', type:'daily', threshold:100},
];

const CAT_CC = {
  H:{bg:'#E6F1FB',t:'#0C447C',b:'#b5d4f4'}, Y:{bg:'#E1F5EE',t:'#085041',b:'#9fe1cb'},
  G:{bg:'#FAEEDA',t:'#633806',b:'#fac775'}, I:{bg:'#EEEAF9',t:'#2D2580',b:'#c5bef0'},
  E:{bg:'#FEF0F0',t:'#7a1c1c',b:'#f0a0a0'}, N:{bg:'#f5f5f3',t:'#444441',b:'#ccc'},
  P:{bg:'#FFFBEA',t:'#B8860B',b:'#E8D87A'}, S:{bg:'#E6F1FB',t:'#185FA5',b:'#b5d4f4'},
};

// ── HELPERS ──
function getHabDone(hid, d) {
  const isToday = d === TODAY;
  if (isToday) return HABITS.find(h => h.id === hid)?.done || false;
  if (d < TODAY) return HDATA[hid] ? (HDATA[hid][d-1] === 1 || HDATA[hid][d-1] === true) : false;
  // future: check DAY_STORE
  const st = DAY_STORE[dayKey(d)];
  return st ? (st.habits[hid] || false) : false;
}

function getCurrentStreak() {
  // how many consecutive days up to currentDay with >=50% habits done
  let streak = 0;
  for (let d = currentDay; d >= 1; d--) {
    const total = HABITS.length;
    const done = HABITS.filter(h => getHabDone(h.id, d)).length;
    if (done / total >= 0.5) streak++;
    else break;
  }
  return streak;
}

function getTodayHabPct() {
  const done = HABITS.filter(h => getHabDone(h.id, currentDay)).length;
  return Math.round(done / HABITS.length * 100);
}

// ── DATE ──
function changeDay(d) {
  // save current day's habit state before switching
  saveTodayHabits();
  currentDay = Math.max(1, Math.min(DAYS, currentDay + d));
  loadDayState();
  refreshAll();
}
function goToday() { saveTodayHabits(); currentDay = TODAY; loadDayState(); refreshAll(); }

function saveTodayHabits() {
  if (currentDay !== TODAY) return;
  const k = dayKey(currentDay);
  if (!DAY_STORE[k]) getDayState(currentDay);
  HABITS.forEach(h => { DAY_STORE[k].habits[h.id] = h.done; });
}

function loadDayState() {
  const st = getDayState(currentDay);
  if (currentDay === TODAY) {
    HABITS.forEach(h => { h.done = st.habits[h.id] || false; });
  }
}

function refreshAll() {
  document.getElementById('date-label').textContent = fmt(currentDay);
  renderBanner(); renderBlocks(); renderHabitsToday(); updateSummary();
  renderTodos();
}

// ── BANNER ──
function renderBanner() {
  const el = document.getElementById('planned-banner');
  const acts = ACTIVITIES.filter(a => a.days[currentDay]);
  if (!acts.length) {
    el.innerHTML = `<div class="banner-lbl">Planned today</div><div class="banner-empty">Nothing planned for this day</div>`;
    return;
  }
  let h = `<div class="banner-lbl">Planned today</div>`;
  acts.forEach(a => {
    const s = a.days[currentDay], done = s === 2;
    const cc = CAT_CC[a.cat] || CAT_CC.N;
    h += `<div class="banner-item${done ? ' done' : ''}">
      <div class="banner-chk${done ? ' on' : ''}" onclick="toggleActDay('${a.id}',${currentDay})"></div>
      <span class="cat-pill" style="background:${cc.bg};color:${cc.t};border:1px solid ${cc.b}">${a.cat}</span>
      <span class="banner-name">${a.name}</span>
    </div>`;
  });
  el.innerHTML = h;
}

function toggleActDay(aid, day) {
  const a = ACTIVITIES.find(x => x.id === aid); if (!a) return;
  const c = a.days[day] || 0; a.days[day] = c === 2 ? 1 : 2;
  renderBanner(); renderPlannedTable();
}

// ── BLOCKS ──
function getBlocks(d) {
  const st = getDayState(d);
  return BLOCK_TEMPLATES.map(t => ({
    ...t,
    done: st.blocks[t.id]?.done || false,
    open: st.blocks[t.id]?.open || false,
    subs: st.blocks[t.id]?.subs || t.defaultSubs.map(s => ({ t: s.t, done: false, def: true, hab: s.hab })),
  }));
}

function setBlockField(d, id, field, val) {
  const st = getDayState(d);
  if (!st.blocks[id]) st.blocks[id] = { done: false, open: false, subs: [] };
  st.blocks[id][field] = val;
}

function trigHab(hid, v) {
  const h = HABITS.find(x => x.id === hid);
  if (h && currentDay === TODAY) h.done = v;
  if (currentDay !== TODAY) {
    const st = getDayState(currentDay);
    st.habits[hid] = v;
  }
}

function recompHabs() {
  const blocks = getBlocks(currentDay);
  const autoSub = new Set(), autoBk = new Set();
  blocks.forEach(b => {
    b.subs.forEach(s => { if (s.hab) autoSub.add(s.hab); });
    if (b.habOnComplete) b.habOnComplete.forEach(hid => autoBk.add(hid));
  });
  autoSub.forEach(id => trigHab(id, false));
  autoBk.forEach(id => trigHab(id, false));
  blocks.forEach(b => {
    b.subs.forEach(s => { if (s.done && s.hab) trigHab(s.hab, true); });
    if (b.done && b.habOnComplete) b.habOnComplete.forEach(hid => trigHab(hid, true));
  });
}

function toggleBlock(id) {
  const st = getDayState(currentDay);
  if (!st.blocks[id]) st.blocks[id] = { done: false, open: false, subs: getBlocks(currentDay).find(b=>b.id===id).subs };
  const b = st.blocks[id];
  b.done = !b.done;
  const tmpl = BLOCK_TEMPLATES.find(t => t.id === id);
  if (b.done) {
    b.subs.forEach(s => { s.done = true; if (s.hab) trigHab(s.hab, true); });
    if (tmpl?.habOnComplete) tmpl.habOnComplete.forEach(hid => trigHab(hid, true));
  } else {
    b.subs.forEach(s => s.done = false);
    recompHabs();
  }
  renderBlocks(); renderHabitsToday(); updateSummary();
}

function toggleSub(id, si) {
  const st = getDayState(currentDay);
  const bState = st.blocks[id];
  const s = bState.subs[si];
  s.done = !s.done;
  if (s.hab) trigHab(s.hab, s.done);
  const tmpl = BLOCK_TEMPLATES.find(t => t.id === id);
  if (bState.subs.length && bState.subs.every(x => x.done)) {
    bState.done = true;
    if (tmpl?.habOnComplete) tmpl.habOnComplete.forEach(hid => trigHab(hid, true));
  }
  if (!s.done) {
    bState.done = false;
    if (tmpl?.habOnComplete) tmpl.habOnComplete.forEach(hid => {
      const still = BLOCK_TEMPLATES.some(ot => ot.id !== id && ot.habOnComplete?.includes(hid) && st.blocks[ot.id]?.done);
      if (!still) trigHab(hid, false);
    });
  }
  renderBlocks(); renderHabitsToday(); updateSummary();
}

function deleteSub(id, si) {
  const st = getDayState(currentDay);
  st.blocks[id].subs.splice(si, 1);
  renderBlocks();
}

function openSubEdit(bid, si) {
  editingSubInfo = { bid, si };
  const st = getDayState(currentDay);
  document.getElementById('sub-edit-val').value = st.blocks[bid].subs[si].t;
  document.getElementById('sub-modal').classList.add('on');
}

function saveSubEdit() {
  if (!editingSubInfo) return;
  const { bid, si } = editingSubInfo;
  const val = document.getElementById('sub-edit-val').value.trim();
  if (val) getDayState(currentDay).blocks[bid].subs[si].t = val;
  closeOverlay('sub-modal'); renderBlocks();
}

function deleteBlock(id) {
  const idx = BLOCK_TEMPLATES.findIndex(t => t.id === id);
  if (idx > -1) BLOCK_TEMPLATES.splice(idx, 1);
  // remove from all day states
  Object.values(DAY_STORE).forEach(st => { delete st.blocks[id]; });
  recompHabs(); renderBlocks(); renderHabitsToday(); updateSummary();
}

function toggleExpand(id) {
  const st = getDayState(currentDay);
  if (!st.blocks[id]) st.blocks[id] = { done: false, open: false, subs: getBlocks(currentDay).find(b=>b.id===id).subs };
  st.blocks[id].open = !st.blocks[id].open;
  renderBlocks();
}

function toggleSection(sec) { SEC_STATE[sec] = !SEC_STATE[sec]; renderBlocks(); }

function addSub(id) {
  const inp = document.getElementById('sub-input-' + id), val = inp.value.trim(); if (!val) return;
  const st = getDayState(currentDay);
  st.blocks[id].subs.push({ t: val, done: false, def: false, hab: null });
  st.blocks[id].open = true;
  inp.value = ''; renderBlocks();
}

const SECS = ['Morning','Work','Afternoon','Night'];

function renderBlocks() {
  const col = document.getElementById('block-col');
  [...col.querySelectorAll('.sec-wrap')].forEach(e => e.remove());
  const blocks = getBlocks(currentDay);

  SECS.forEach(sec => {
    const bs = blocks.filter(b => b.sec === sec); if (!bs.length) return;
    const collapsed = SEC_STATE[sec];
    const doneCnt = bs.filter(b => b.done).length;
    const wrap = document.createElement('div'); wrap.className = 'sec-wrap';
    const sep = document.createElement('div'); sep.className = 'sec-sep';
    sep.onclick = () => toggleSection(sec);
    sep.innerHTML = `<span class="sec-chev${collapsed ? ' closed' : ''}">&#8964;</span>
      <span>${sec}</span>
      <div class="sec-right">
        <span class="sec-count">${doneCnt}/${bs.length}</span>
        <button class="sec-add-btn" onclick="event.stopPropagation();openModal('${sec}')">+ add</button>
      </div>`;
    wrap.appendChild(sep);
    const bDiv = document.createElement('div'); bDiv.className = 'sec-blocks' + (collapsed ? ' collapsed' : '');

    bs.forEach(b => {
      const bw = document.createElement('div');
      bw.className = 'block-wrap' + (b.done ? ' done' : '');
      bw.id = 'bw-' + b.id;
      bw.ondragover = e => { e.preventDefault(); bw.classList.add('drop-target'); };
      bw.ondragleave = () => bw.classList.remove('drop-target');
      bw.ondrop = e => dropTodoOnBlock(e, b.id);
      const ds = b.subs.filter(s => s.done).length, ts = b.subs.length;
      const subRows = b.subs.map((s, si) => `
        <div class="subtask${s.done ? ' done' : ''}">
          <div class="sub-chk${s.done ? ' on' : ''}" onclick="event.stopPropagation();toggleSub('${b.id}',${si})"></div>
          <span class="sub-txt">${s.t}</span>
          ${s.def ? '<span class="sub-badge">default</span>' : '<span class="sub-badge today-only">today</span>'}
          ${s.hab ? `<span class="sub-badge hab">\u2192 ${HABITS.find(h => h.id === s.hab)?.name || s.hab}</span>` : ''}
          <div class="sub-actions">
            <button class="sub-btn" onclick="event.stopPropagation();openSubEdit('${b.id}',${si})" title="Edit">&#9998;</button>
            <button class="sub-btn del" onclick="event.stopPropagation();deleteSub('${b.id}',${si})" title="Delete">&#x2715;</button>
          </div>
        </div>`).join('');
      bw.innerHTML = `
        <div class="block-head" onclick="toggleExpand('${b.id}')">
          <div class="chk${b.done ? ' on' : ''}" onclick="event.stopPropagation();toggleBlock('${b.id}')"></div>
          <span class="block-title">${b.title}</span>
          <span class="sub-count">${ts ? ds + '/' + ts : '\u2014'}</span>
          <button class="blk-edit-btn" onclick="event.stopPropagation();openEditModal('${b.id}')" title="Edit block">&#9998;</button>
          <button class="blk-del-btn" onclick="event.stopPropagation();deleteBlock('${b.id}')" title="Delete block">&#x1F5D1;</button>
        </div>
        <div class="block-result">\u2192 ${b.result}</div>
        <div class="tags">
          <span class="tag tag-${b.cat}">${b.cat === 'h' ? 'health' : b.cat === 'w' ? 'work' : 'project'}</span>
          ${b.habOnComplete && b.habOnComplete.length ? `<span class="tag tag-fire">fires: ${b.habOnComplete.map(hid => HABITS.find(h=>h.id===hid)?.name||hid).join(', ')}</span>` : ''}
        </div>
        <div class="subtasks${b.open ? ' open' : ''}" id="subs-${b.id}">
          ${subRows}
          <div class="add-sub-row">
            <input id="sub-input-${b.id}" type="text" placeholder="Add subtask for today..." onclick="event.stopPropagation()">
            <button onclick="event.stopPropagation();addSub('${b.id}')">+</button>
          </div>
        </div>`;
      bDiv.appendChild(bw);
    });
    wrap.appendChild(bDiv); col.appendChild(wrap);
  });
  updateProgress();
}

function updateProgress() {
  const blocks = getBlocks(currentDay);
  const d = blocks.filter(b => b.done).length, t = blocks.length;
  document.getElementById('prog').style.width = Math.round(d / t * 100) + '%';
  document.getElementById('prog-label').textContent = d + '/' + t;
}

// ── HABITS TODAY ──
function renderHabitsToday() {
  const el = document.getElementById('hab-today'); el.innerHTML = '';
  const isToday = currentDay === TODAY;
  const isPast = currentDay < TODAY;
  const groups = [...new Set(HABITS.map(h => h.group))];
  groups.forEach(grp => {
    const grpHabs = HABITS.filter(h => h.group === grp);

    glRow.innerHTML = `<span>${grp}</span><button class="hab-grp-add" onclick="openHabModal('${grp}')">+ add habit</button>`;
    el.appendChild(glRow);
    grpHabs.forEach((h, _) => {
      const i = HABITS.indexOf(h);
      const row = document.createElement('div'); row.className = 'hab-row';
      const isDone = getHabDone(h.id, currentDay);
      const isAutoSub = BLOCK_TEMPLATES.some(b => b.defaultSubs?.some(s => s.hab === h.id));
      const isAutoBk = BLOCK_TEMPLATES.some(b => b.habOnComplete?.includes(h.id));
      const isAuto = isAutoSub || isAutoBk;
      const canClick = isToday;
      row.innerHTML = `<div class="hab-dot" style="background:${h.color}"></div>
        <span class="hab-name">${h.name}</span>

        </div>

      el.appendChild(row);
    });
  });
  const done = HABITS.filter(h => getHabDone(h.id, currentDay)).length;
  document.getElementById('hab-count').textContent = done + '/' + HABITS.length;
}

function manualToggleHab(i) {
  if (currentDay !== TODAY) return;
  HABITS[i].done = !HABITS[i].done;
  renderHabitsToday(); updateSummary();
}

function deleteHabit(i) {
  HABITS.splice(i, 1);

}

        box.title = `${h.name} \u2014 June ${d}`;

}

// ── REWARDS ──
function renderRewards() {
  const wrap = document.getElementById('rewards-wrap'); wrap.innerHTML = '';
  const todayPct = getTodayHabPct();
  const streak = getCurrentStreak();
  const title = document.createElement('div'); title.className = 'rewards-title';
  title.innerHTML = `<span>Rewards \u2014 today: ${todayPct}% habits &nbsp;&#183;&nbsp; ${streak}d streak</span>
    <button class="add-reward-btn" onclick="document.getElementById('reward-modal').classList.add('on')">+ Add reward</button>`;
  wrap.appendChild(title);
  const grid = document.createElement('div'); grid.className = 'reward-grid';
  REWARDS.forEach((r, ri) => {
    let progress = 0, unlocked = false;
    if (r.type === 'daily') {
      progress = Math.min(100, Math.round(todayPct / r.threshold * 100));
      unlocked = todayPct >= r.threshold;
    } else {
      progress = Math.min(100, Math.round(streak / r.threshold * 100));
      unlocked = streak >= r.threshold;
    }
    const card = document.createElement('div'); card.className = 'reward-card' + (unlocked ? ' unlocked' : '');
    card.innerHTML = `<button class="reward-del" onclick="REWARDS.splice(${ri},1);renderRewards()" title="Remove">\u2715</button>
      <div class="reward-icon">${r.icon || '\u{1F3C6}'}</div>
      <div class="reward-name">${r.name}</div>
      <div class="reward-cond">${r.type === 'daily' ? r.threshold + '% habits in a day' : r.threshold + ' days streak'}</div>
      <div class="reward-prog-bar"><div class="reward-prog-fill" style="width:${progress}%"></div></div>
      <div class="reward-pct">${progress}% \u2014 ${unlocked ? '\u{1F513} unlocked!' : 'locked'}</div>`;
    grid.appendChild(card);
  });
  wrap.appendChild(grid);
}

function saveReward() {

  }

  const dowRow = document.createElement('tr'); dowRow.appendChild(document.createElement('td'));
  for (let d = 1; d <= DAYS; d++) {
    const td = document.createElement('td'); td.style.cssText = 'font-size:9px;color:var(--text3);text-align:center'; td.textContent = DOW[getDow(d)]; dowRow.appendChild(td);
  }
  table.appendChild(dowRow);
  ACTIVITIES.forEach((a, idx) => {
    const tr = document.createElement('tr'); tr.className = 'act-tr'; tr.draggable = true; tr.dataset.idx = idx;
    tr.ondragstart = e => { dragSrc = idx; tr.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; };
    tr.ondragend = () => { tr.classList.remove('dragging'); document.querySelectorAll('.act-tr').forEach(r => r.classList.remove('drag-over')); };
    tr.ondragover = e => { e.preventDefault(); tr.classList.add('drag-over'); };
    tr.ondragleave = () => tr.classList.remove('drag-over');
    tr.ondrop = e => {
      e.preventDefault(); tr.classList.remove('drag-over');
      if (dragSrc === null || dragSrc === idx) return;
      const moved = ACTIVITIES.splice(dragSrc, 1)[0]; ACTIVITIES.splice(idx, 0, moved);
      dragSrc = null; renderPlannedTable(); renderBanner();
    };
    const cc = CAT_CC[a.cat] || CAT_CC.N;
    const ltd = document.createElement('td'); ltd.className = 'act-lbl-td';
    ltd.innerHTML = `<span class="grip">&#8801;</span><span class="act-cat" style="background:${cc.bg};color:${cc.t};border:1px solid ${cc.b}">${a.cat}</span>${a.name}`;
    tr.appendChild(ltd);

      const td = document.createElement('td');
      const state = a.days[d] || 0;
      const box = document.createElement('div');
      box.className = 'plan-box' + (state === 1 ? ' sched' : state === 2 ? ' done-a' : '') + (d === currentDay ? ' today-c' : '') + (isWknd(d) ? ' wknd-b' : '');
      box.title = `${a.name} \u2014 June ${d}`;
      box.onclick = ((_d, _a) => () => { const c = _a.days[_d] || 0; _a.days[_d] = c === 0 ? 1 : c === 1 ? 2 : 0; renderPlannedTable(); renderBanner(); })(d, a);
      td.appendChild(box); tr.appendChild(td);
    }
    table.appendChild(tr);
  });
  wrap.appendChild(table);
}

}

function openEditModal(id) {
  const t = BLOCK_TEMPLATES.find(x => x.id === id); if (!t) return;
  editingBlockId = id;
  document.getElementById('modal-title').textContent = 'Edit block';
  document.getElementById('m-name').value = t.title;
  document.getElementById('m-result').value = t.result;
  document.getElementById('m-section').value = t.sec;
  document.getElementById('m-cat').value = t.cat;
  document.getElementById('modal').classList.add('on');
}

function closeOverlay(id) { document.getElementById(id).classList.remove('on'); }

function saveBlock() {
  const name = document.getElementById('m-name').value.trim() || 'New block';
  const result = document.getElementById('m-result').value.trim() || 'Result pending';
  const sec = document.getElementById('m-section').value;
  const cat = document.getElementById('m-cat').value;
  if (editingBlockId) {
    const t = BLOCK_TEMPLATES.find(x => x.id === editingBlockId);
    t.title = name; t.result = result; t.sec = sec; t.cat = cat;
  } else {
    const newId = 'b' + Date.now();
    BLOCK_TEMPLATES.push({ id: newId, sec, title: name, result, cat, habOnComplete: [], defaultSubs: [] });
    // init today's state for this block
    const st = getDayState(currentDay);
    st.blocks[newId] = { done: false, open: true, subs: [] };
  }
  closeOverlay('modal'); renderBlocks();
}

function openActModal() { document.getElementById('act-modal').classList.add('on'); }

function saveActivity() {
  const name = document.getElementById('a-name').value.trim(); if (!name) return;
  const cat = document.getElementById('a-cat').value;
  const day = parseInt(document.getElementById('a-day').value) || 0;
  ACTIVITIES.push({ id: 'a' + Date.now(), name, cat, days: day >= 1 && day <= 30 ? { [day]: 1 } : {} });
  closeOverlay('act-modal'); renderPlannedTable(); renderBanner();
}

document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('on'); });
});


// ── HAB SECTION COLLAPSE (right col) ──
let habSectionOpen = true;
function toggleRightHab() {
  habSectionOpen = !habSectionOpen;
  const body = document.getElementById('right-hab-body');
  const chev = document.getElementById('right-hab-chev');
  if (body) body.style.display = habSectionOpen ? '' : 'none';
  if (chev) chev.style.transform = habSectionOpen ? '' : 'rotate(-90deg)';
}

// ── TODO DATA ──
// today todos: { [dayKey]: [{id, text, done}] }
const TODO_TODAY = {};
// general todos: [{id, text, done}] — persists, archived when done+closed
let TODO_GENERAL = [];
let dispatchingTodo = null; // {type, dayKey, id}

function getTodayTodos(d) {
  const k = 'june-' + d;
  if (!TODO_TODAY[k]) TODO_TODAY[k] = [];
  return TODO_TODAY[k];
}

function addTodo(type) {
  const inputId = type === 'today' ? 'todo-today-input' : 'todo-general-input';
  const inp = document.getElementById(inputId);
  const val = inp.value.trim(); if (!val) return;
  const item = { id: 't' + Date.now() + Math.random(), text: val, done: false };
  if (type === 'today') {
    getTodayTodos(currentDay).push(item);
  } else {
    TODO_GENERAL.push(item);
  }
  inp.value = '';
  renderTodos();
}

function toggleTodo(type, id, dayKey) {
  let item;
  if (type === 'today') {
    const list = TODO_TODAY[dayKey] || [];
    item = list.find(x => x.id === id);
  } else {
    item = TODO_GENERAL.find(x => x.id === id);
  }
  if (item) item.done = !item.done;
  renderTodos();
}

function deleteTodo(type, id, dayKey) {
  if (type === 'today') {
    const list = TODO_TODAY[dayKey] || [];
    const idx = list.findIndex(x => x.id === id);
    if (idx > -1) list.splice(idx, 1);
  } else {
    const idx = TODO_GENERAL.findIndex(x => x.id === id);
    if (idx > -1) TODO_GENERAL.splice(idx, 1);
  }
  renderTodos();
}

function openDispatch(type, id, dayKey) {
  dispatchingTodo = { type, id, dayKey };
  document.getElementById('dp-day').value = currentDay;
  updateDispatchBlocks();
  document.getElementById('dispatch-modal').classList.add('on');
}

function updateDispatchBlocks() {
  const sec = document.getElementById('dp-section').value;
  const sel = document.getElementById('dp-block');
  sel.innerHTML = '';
  BLOCK_TEMPLATES.filter(b => b.sec === sec).forEach(b => {
    const opt = document.createElement('option');
    opt.value = b.id; opt.textContent = b.title;
    sel.appendChild(opt);
  });
}
// wire section change
setTimeout(() => {
  const dpSec = document.getElementById('dp-section');
  if (dpSec) dpSec.onchange = updateDispatchBlocks;
}, 500);

function confirmDispatch() {
  if (!dispatchingTodo) return;
  const { type, id, dayKey } = dispatchingTodo;
  let item;
  if (type === 'today') {
    item = (TODO_TODAY[dayKey] || []).find(x => x.id === id);
  } else {
    item = TODO_GENERAL.find(x => x.id === id);
  }
  if (!item) { closeOverlay('dispatch-modal'); return; }

  const targetDay = parseInt(document.getElementById('dp-day').value) || currentDay;
  const targetBid = document.getElementById('dp-block').value;

  // Add to target day's block as a subtask
  const st = getDayState(targetDay);
  if (!st.blocks[targetBid]) {
    const tmpl = BLOCK_TEMPLATES.find(t => t.id === targetBid);
    st.blocks[targetBid] = {
      done: false, open: false,
      subs: tmpl ? tmpl.defaultSubs.map(s => ({ t: s.t, done: false, def: true, hab: s.hab })) : []
    };
  }
  st.blocks[targetBid].subs.push({ t: item.text, done: false, def: false, hab: null });
  st.blocks[targetBid].open = true;

  // Remove from todo list
  deleteTodo(type, id, dayKey);
  closeOverlay('dispatch-modal');
  // re-render blocks if dispatched to current day
  if (targetDay === currentDay) renderBlocks();
  renderTodos();
}

// ── DRAG FROM TODO ONTO BLOCK ──
let draggingTodo = null; // {type, id, dayKey}

function onTodoDragStart(e, type, id, dayK) {
  draggingTodo = { type, id, dayKey: dayK };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
}

// Called when dropped onto the list zone (reorder between lists)
function dropTodoOnList(e, targetType) {
  e.preventDefault();
  if (!draggingTodo) return;
  const { type, id, dayKey } = draggingTodo;
  if (type === targetType) { draggingTodo = null; return; } // same list, no-op
  // move between lists
  let item;
  if (type === 'today') {
    const list = TODO_TODAY[dayKey] || [];
    const idx = list.findIndex(x => x.id === id);
    if (idx > -1) { item = list.splice(idx, 1)[0]; }
  } else {
    const idx = TODO_GENERAL.findIndex(x => x.id === id);
    if (idx > -1) { item = TODO_GENERAL.splice(idx, 1)[0]; }
  }
  if (item) {
    item.done = false;
    if (targetType === 'today') getTodayTodos(currentDay).push(item);
    else TODO_GENERAL.push(item);
  }
  draggingTodo = null;
  renderTodos();
}

// Called when dropped onto a block (dispatch)
function dropTodoOnBlock(e, bid) {
  e.preventDefault();
  e.stopPropagation();
  const bwEl = document.getElementById('bw-' + bid);
  if (bwEl) bwEl.classList.remove('drop-target');
  if (!draggingTodo) return;
  const { type, id, dayKey } = draggingTodo;
  let item;
  if (type === 'today') {
    const list = TODO_TODAY[dayKey] || [];
    const idx = list.findIndex(x => x.id === id);
    if (idx > -1) item = list.splice(idx, 1)[0];
  } else {
    const idx = TODO_GENERAL.findIndex(x => x.id === id);
    if (idx > -1) item = TODO_GENERAL.splice(idx, 1)[0];
  }
  if (item) {
    const st = getDayState(currentDay);
    if (!st.blocks[bid]) {
      const tmpl = BLOCK_TEMPLATES.find(t => t.id === bid);
      st.blocks[bid] = { done: false, open: false, subs: tmpl ? tmpl.defaultSubs.map(s => ({ t: s.t, done: false, def: true, hab: s.hab })) : [] };
    }
    st.blocks[bid].subs.push({ t: item.text, done: false, def: false, hab: null });
    st.blocks[bid].open = true;
  }
  draggingTodo = null;
  renderTodos();
  renderBlocks();
}

function renderTodos() {
  const dayK = 'june-' + currentDay;
  const lbl = document.getElementById('todo-day-label');
  if (lbl) lbl.textContent = fmt(currentDay);

  const makeTodoItem = (item, type, dk) => {
    const div = document.createElement('div');
    div.className = 'todo-item' + (item.done ? ' done-todo' : '');
    div.draggable = true;
    div.style.cursor = 'grab';
    div.title = 'Drag onto a block to add as subtask';
    div.ondragstart = e => onTodoDragStart(e, type, item.id, dk);
    div.ondragend = () => { draggingTodo = null; document.querySelectorAll('.block-wrap.drop-target').forEach(el => el.classList.remove('drop-target')); };
    div.innerHTML = `
      <div class="todo-chk${item.done ? ' on' : ''}" onclick="toggleTodo('${type}','${item.id}','${dk}')"></div>
      <span class="todo-text">${item.text}</span>
      <div class="todo-item-actions">
        <button class="todo-act-btn dispatch" onclick="openDispatch('${type}','${item.id}','${dk}')" title="Pick block to send to">&#8599;</button>
        <button class="todo-act-btn del" onclick="deleteTodo('${type}','${item.id}','${dk}')" title="Delete">&#x2715;</button>
      </div>`;
    return div;
  };

  // TODAY
  const todayEl = document.getElementById('todo-today-list');
  if (todayEl) {
    todayEl.innerHTML = '';
    const todayItems = getTodayTodos(currentDay);
    if (!todayItems.length) {
      todayEl.innerHTML = '<div class="todo-empty">No to-dos for today</div>';
    } else {
      todayItems.forEach(item => todayEl.appendChild(makeTodoItem(item, 'today', dayK)));
    }
  }

  // GENERAL
  const generalEl = document.getElementById('todo-general-list');
  if (generalEl) {
    generalEl.innerHTML = '';
    if (!TODO_GENERAL.length) {
      generalEl.innerHTML = '<div class="todo-empty">No general to-dos</div>';
    } else {
      TODO_GENERAL.forEach(item => generalEl.appendChild(makeTodoItem(item, 'general', '')));
    }
  }
}

// INIT
document.getElementById('date-label').textContent = fmt(TODAY);
getDayState(TODAY); // init today
renderBlocks(); renderHabitsToday(); renderBanner(); updateSummary(); renderTodos();

TODO_GENERAL.push({id:'tg2',text:'Review Routemize onboarding flow',done:false});
TODO_GENERAL.push({id:'tg3',text:'Plan WIVO next milestone',done:false});
</script>
